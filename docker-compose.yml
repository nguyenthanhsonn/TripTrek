version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 28052005
      MYSQL_DATABASE: triptrek
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: nest-api
    restart: always
    ports:
      - "5050:5050"
    env_file:
      - .env
    depends_on:
      - mysql

volumes:
  mysql_data:
